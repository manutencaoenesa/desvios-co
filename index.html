<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeções Central de Operações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen relative font-sans">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center transition-opacity">
        <div class="loader mb-4"></div>
        <p class="text-gray-700 font-semibold" id="loadingText">Carregando dados...</p>
    </div>

    <header class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-30">
        <h1 class="text-xl font-bold">Central de Operações - Desvios</h1>
    </header>

    <main id="mainView" class="p-4 hide">
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-20 fade-in">
        </div>
    </main>

    <button id="fabBtn" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-3xl hover:bg-blue-700 transition hide z-40" onclick="toggleForm()">
        +
    </button>

    <div id="formModal" class="fixed inset-0 bg-gray-900/50 z-40 hide fade-in overflow-y-auto">
        <div class="bg-white min-h-screen md:min-h-0 md:my-10 md:mx-auto md:max-w-2xl md:rounded-lg shadow-xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Registrar Novo Desvio</h2>
                <button onclick="toggleForm()" class="text-gray-500 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>

            <form id="desvioForm" onsubmit="submitForm(event)" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Identificado por</label>
                    <input type="text" id="identificadoPor" list="listaNomes" required class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    <datalist id="listaNomes"></datalist>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Data de Identificação</label>
                    <input type="date" id="dataIdentificacao" required class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Desvio Identificado</label>
                    <input type="text" id="desvio" required class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Empresa Responsável</label>
                    <select id="empresa" required class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Local</label>
                    <input type="text" id="local" required class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Observação</label>
                    <textarea id="observacao" rows="3" class="mt-1 w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Foto 1</label>
                        <input type="file" id="foto1" accept="image/*" capture="environment" class="mt-1 w-full text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Foto 2</label>
                        <input type="file" id="foto2" accept="image/*" capture="environment" class="mt-1 w-full text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded mt-6 hover:bg-blue-700 transition">
                    Criar e Enviar Relatório
                </button>
            </form>
        </div>
    </div>

    <script>
        // === COLE A SUA NOVA URL DO APPS SCRIPT AQUI ===
        const GAS_URL = "https://script.google.com/macros/s/AKfycbymuxE_pijjqd0FMZyXuBop-GcpA-CSIhsmWCh8Z5QuC2Dc2YdeOTMRAmOzugJ3J-zs/exec";
        
        let desviosGlobais = [];
        let nomesUnicos = new Set();

        window.onload = () => {
            document.getElementById('dataIdentificacao').valueAsDate = new Date();
            carregarDados();
        };

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.remove('hide');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hide');
        }

        function toggleForm() {
            document.getElementById('formModal').classList.toggle('hide');
        }

        async function carregarDados() {
            showLoading("Carregando informações...");
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                desviosGlobais = data.desvios.reverse(); 
                renderCards();
                
                const selectEmpresa = document.getElementById('empresa');
                selectEmpresa.innerHTML = '<option value="">Selecione...</option>';
                data.empresas.forEach(emp => {
                    selectEmpresa.innerHTML += `<option value="${emp}">${emp}</option>`;
                });

                const listaNomes = document.getElementById('listaNomes');
                listaNomes.innerHTML = '';
                data.desvios.forEach(d => { if(d.identificadoPor) nomesUnicos.add(d.identificadoPor); });
                nomesUnicos.forEach(nome => {
                    listaNomes.innerHTML += `<option value="${nome}">`;
                });

                document.getElementById('mainView').classList.remove('hide');
                document.getElementById('fabBtn').classList.remove('hide');
            } catch (err) {
                alert("Erro ao carregar os dados.");
                console.error(err);
            }
            hideLoading();
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            desviosGlobais.forEach(item => {
                let colorClass = "bg-white border-gray-200";
                if (item.status === "Não iniciado") colorClass = "bg-red-50 border-red-300";
                if (item.status === "Em andamento") colorClass = "bg-yellow-50 border-yellow-300";
                if (item.status === "Resolvido") colorClass = "bg-green-50 border-green-300";

                const dataFormatada = item.data ? new Date(item.data).toLocaleDateString('pt-BR') : '-';

                const card = `
                    <div class="border rounded-lg p-4 shadow-sm ${colorClass} transition-all">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-gray-700">ID: ${item.id}</span>
                            <span class="text-xs text-gray-500">${dataFormatada}</span>
                        </div>
                        <h3 class="font-semibold text-lg text-gray-800 mb-1">${item.desvio}</h3>
                        <p class="text-sm text-gray-600 mb-1"><b>Empresa:</b> ${item.empresa}</p>
                        <p class="text-sm text-gray-600 mb-3"><b>Local:</b> ${item.local}</p>
                        
                        <div class="mt-2 pt-2 border-t border-gray-200">
                            <label class="text-xs font-semibold text-gray-500 block mb-1">Status:</label>
                            <select onchange="alterarStatus('${item.id}', this.value)" class="w-full text-sm p-1 rounded border border-gray-300 bg-white">
                                <option value="Não iniciado" ${item.status === 'Não iniciado' ? 'selected' : ''}>Não iniciado</option>
                                <option value="Em andamento" ${item.status === 'Em andamento' ? 'selected' : ''}>Em andamento</option>
                                <option value="Resolvido" ${item.status === 'Resolvido' ? 'selected' : ''}>Resolvido</option>
                            </select>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        async function alterarStatus(id, novoStatus) {
            showLoading("Atualizando status...");
            try {
                const payload = { action: "updateStatus", id: id, status: novoStatus };
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                carregarDados();
            } catch (err) {
                alert("Erro ao atualizar status");
                hideLoading();
            }
        }

        // NOVO: Função que redimensiona e comprime a imagem antes de enviar
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve(null);
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Define limite máximo de 800px de altura ou largura
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Converte a imagem comprimida para base64 com qualidade 70%
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        async function submitForm(e) {
            e.preventDefault();
            showLoading("Preparando imagens e enviando... (Isso pode levar alguns segundos)");

            const file1 = document.getElementById('foto1').files[0];
            const file2 = document.getElementById('foto2').files[0];

            try {
                // Aqui chamamos o compressor de imagens antes do envio
                const base64Foto1 = await compressImage(file1);
                const base64Foto2 = await compressImage(file2);

                const dateRaw = document.getElementById('dataIdentificacao').value;
                const [year, month, day] = dateRaw.split('-');
                const dataBr = `${day}/${month}/${year}`;

                const payload = {
                    action: "create",
                    identificadoPor: document.getElementById('identificadoPor').value,
                    data: dataBr,
                    desvio: document.getElementById('desvio').value,
                    empresa: document.getElementById('empresa').value,
                    local: document.getElementById('local').value,
                    observacao: document.getElementById('observacao').value,
                    foto1: base64Foto1,
                    foto2: base64Foto2
                };

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                const jsonResponse = await response.json();

                if (!jsonResponse.sucesso) {
                    alert("Erro do Servidor: " + jsonResponse.erro);
                    hideLoading();
                    return;
                }

                document.getElementById('desvioForm').reset();
                document.getElementById('dataIdentificacao').valueAsDate = new Date();
                toggleForm();
                carregarDados();

            } catch (err) {
                console.error(err);
                alert("Ocorreu um erro ao enviar.");
                hideLoading();
            }
        }
    </script>
</body>
</html>
